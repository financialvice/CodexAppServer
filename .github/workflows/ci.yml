name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Read pinned Codex version
        run: echo "CODEX_VERSION=$(tr -d '[:space:]' < .codex-version)" >> "$GITHUB_ENV"

      - name: Install Codex CLI
        run: npm install -g "@openai/codex@${CODEX_VERSION}"

      - name: Verify Codex version
        run: codex --version

      - name: Regenerate protocol bindings
        run: ./Scripts/generate-protocol.sh

      - name: Verify generated files are committed
        run: git diff --exit-code

      - name: Build package
        run: swift build

      - name: Run tests
        run: swift test
